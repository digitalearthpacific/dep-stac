services:
  postgis:
    image: postgis/postgis:17-3.5
    platform: linux/amd64
    restart: on-failure
    environment:
      POSTGRES_USER: username
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgis
    ports:
      - 5432:5432

  stac:
    # Option 1: Default image:
    # image: ghcr.io/stac-utils/stac-fastapi-pgstac:6.3.1
    # platform: linux/amd64
    # Option 2: Local custom build (based on Dockerfile in this repo):
    build: .
    depends_on:
      - postgis
    environment:
      APP_HOST: "0.0.0.0"
      APP_PORT: 8000
      # For the app
      POSTGRES_HOST_READER: postgis
      POSTGRES_HOST_WRITER: postgis
      POSTGRES_USER: username
      POSTGRES_PASS: password
      POSTGRES_DBNAME: postgis
      POSTGRES_PORT: 5432
      # For pypgstac
      PGUSER: username
      PGPASSWORD: password
      PGDATABASE: postgis
      PGHOST: postgis
    ports:
      - 8000:8000
    # Turn on volumes to persist data between container restarts.
    # volumes:
    #   - .:/code
    # Option 1: Default app:
    # command: uv run uvicorn stac_fastapi.pgstac.app:app --host 0.0.0.0 --port 8000
    # Option 2: Custom app:
    command: uv run uvicorn stac_api.app:app --host 0.0.0.0 --port 8000 # Redundant given the CMD in Dockerfile, but explicit.
